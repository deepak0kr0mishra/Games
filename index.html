<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
</head>
<body class="bg-slate-900 text-white flex flex-col gap-6">

    <div class="bg-cyan-800 p-4 text-white mx-6 rounded-2xl shadow-md flex flex-rows justify-between">
        <p class="text-center text-3xl ">Stone Paper and Scissors</p>
        <p id="welcome"></p>
    </div>
    

    <div class="bg-slate-00 p-5 flex flex-row gap-6 justify-between">
        <div class="flex flex-col gap-3">
            <button class="bg-slate-900 hover:bg-slate-700 p-3 rounded " onclick="
                playGame('rock');
                ">Stone</button>

            <button class="bg-slate-900 hover:bg-slate-700 p-3 rounded " onclick="
                playGame('paper') ;
                ">Paper</button>

            <button class="bg-slate-900 hover:bg-slate-700 p-3 rounded " onclick="
                playGame('scissor');
                ">Scissors</button>
        </div>

        <div>
            <p id="user"></p>
            <p id="computer"></p>
            <p id="result"></p>
            <p id="score"></p>
        </div>
    </div>

   

    <div class="">
        <input class="text-slate-900 rounded" type="text" placeholder="Username" id="username">
        <button class="" onclick="createUser()">Login</button>
        
    </div>
    <script src="main.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
